version: "3.9"

# ============================================================
# FilX.io — Local Development Stack
# Usage: docker-compose -f infra/docker/docker-compose.yml up
# ============================================================

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: filx-postgres
    environment:
      POSTGRES_USER: filx
      POSTGRES_PASSWORD: filxpass
      POSTGRES_DB: filxio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filx -d filxio"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: filx-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: filx-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://filx:filxpass@postgres:5432/filxio
      DATABASE_URL_SYNC: postgresql://filx:filxpass@postgres:5432/filxio
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    env_file:
      - ../../.env
    volumes:
      - ../../backend:/app
      - /tmp/filx-uploads:/tmp/uploads  # temp file workspace
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ───────────────────────────────────────────
  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: filx-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,pdf,image,ocr
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://filx:filxpass@postgres:5432/filxio
      DATABASE_URL_SYNC: postgresql://filx:filxpass@postgres:5432/filxio
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    env_file:
      - ../../.env
    volumes:
      - ../../backend:/app
      - /tmp/filx-uploads:/tmp/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (scheduler) ──────────────────────────────────
  beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: filx-beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    env_file:
      - ../../.env
    volumes:
      - ../../backend:/app
    depends_on:
      - redis

  # ── Flower (Celery monitoring) ───────────────────────────────
  flower:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: filx-flower
    command: celery -A app.workers.celery_app flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: dev
    container_name: filx-frontend
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    env_file:
      - ../../.env
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: filx-network
