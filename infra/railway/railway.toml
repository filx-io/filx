# ============================================================
# FilX.io — Railway Deployment Configuration
# Docs: https://docs.railway.app/reference/config-as-code
# ============================================================

[build]
builder = "DOCKERFILE"

# ── Backend Service ─────────────────────────────────────────
[[services]]
name = "backend"
source = "backend"
dockerfile = "Dockerfile"

[services.deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[services.variables]
APP_ENV = "production"
LOG_LEVEL = "INFO"

# ── Worker Service ───────────────────────────────────────────
[[services]]
name = "worker"
source = "backend"
dockerfile = "Dockerfile"

[services.deploy]
startCommand = "celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q default,pdf,image,ocr"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Frontend Service ─────────────────────────────────────────
[[services]]
name = "frontend"
source = "frontend"
dockerfile = "Dockerfile"

[services.deploy]
startCommand = "node .next/standalone/server.js"
healthcheckPath = "/"
healthcheckTimeout = 30
